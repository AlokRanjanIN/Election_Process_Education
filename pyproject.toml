[tool.ruff]
target-version = "py311"
line-length = 88
src = ["backend"]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "B"]
ignore = ["B904", "B905"]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S101"]

[tool.mypy]
python_version = "3.11"
files = ["backend"]
ignore_missing_imports = true
strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
